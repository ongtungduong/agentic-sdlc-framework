schema: spec-driven

# OpenSpec workspace for the ask-ranger kit itself.
# Target repos get their own openspec/ via `openspec init` during setup.sh.
context: |
  ask-ranger is a scaffolding kit — not an application. It's a pile of shell
  scripts, bats tests, Makefiles, and markdown prompts that wire five tools
  together (OpenSpec, GitNexus, Claude Code, Superpowers, AgentShield) into a
  spec-driven workflow for solo developers.

  Spec changes typically touch one of:
    - scripts/setup.sh        (install behavior)
    - scripts/sync-platforms.sh (canonical → per-platform generation)
    - template/CLAUDE.md / template/AGENTS.md (AI system prompts)
    - template/workflows/<skill>/SKILL.md (canonical opsx workflow source)
    - template/vendor/ecc-hooks/* (pinned AgentShield hooks)

  Non-goals: feature-rich tooling, GUI, multi-user teams.

rules:
  proposal:
    - State the target file or subsystem in the first sentence.
    - Call out breaking changes to target-repo users explicitly.
    - Include a "Non-goals" section.
  tasks:
    - Every task must be verifiable with `bats tests/`, `shellcheck`,
      or `bash scripts/sync-platforms.sh` producing no drift.
    - No task should exceed 5 minutes of focused work.
